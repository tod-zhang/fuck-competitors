<div class="modal">
  <div class="washi-top"></div>
  <h3>竞品设置 · {{ name }}</h3>
  <p class="sub">修改监控配置，或停止监控这个竞品。</p>
  <form method="post" action="/competitors/{{ id }}/update">
    <div class="field"><label>竞品名称</label><input name="name" value="{{ name }}" required></div>
    <div class="field"><label>Sitemap 地址</label><input name="sitemap_url" value="{{ sitemap_url }}" required></div>
    <div class="field"><label>巡检频率</label>
      <div class="xselect">
        <button type="button" class="xselect-trigger">
          <span class="xselect-label">{{ '每周' if interval == 168 else '每天' }}</span><span class="xselect-caret">▾</span>
        </button>
        <input type="hidden" name="interval_hours" value="{{ 168 if interval == 168 else 24 }}">
        <ul class="xselect-menu" role="listbox">
          <li data-value="24"{% if interval != 168 %} class="sel"{% endif %}>每天</li>
          <li data-value="168"{% if interval == 168 %} class="sel"{% endif %}>每周</li>
        </ul>
      </div>
    </div>
    <div class="modal-foot">
      <button type="submit" class="btn btn-soft" style="margin-right:auto" formaction="/competitors/{{ id }}/check" formnovalidate>立即巡检</button>
      <button type="button" class="btn btn-ghost" onclick="closeSettings()">取消</button>
      <button type="submit" class="btn btn-primary">保存</button>
    </div>
  </form>
  <div class="danger-zone">
    <div class="dz-text">
      <div class="dz-label">危险操作</div>
      <div class="dz-desc">停止监控，并删除它的全部页面与变更记录</div>
    </div>
    <form method="post" action="/competitors/{{ id }}/delete" onsubmit="return confirm('确定删除「{{ name }}」？\n它的全部追踪页面、变更记录与快照都会一并删除，不可恢复。')">
      <button type="submit" class="btn-danger">删除竞品</button>
    </form>
  </div>
</div>
