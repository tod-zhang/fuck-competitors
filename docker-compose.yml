# Pin the project name so the container/network names never drift, even when launched
# with a bare `docker compose` from a renamed or non-ASCII directory.
name: fuck-competitors

services:
  app:
    build: .
    container_name: fuck-competitors
    ports:
      - "9527:9527"
    volumes:
      # DB lives on the host at ./data — survives image rebuilds, `down -v`, and project-name
      # changes (a bind mount is NOT a named volume, so -v can't delete it). To keep data when
      # redeploying from a fresh checkout, point this at a fixed absolute path instead, e.g.
      # /var/lib/fuck-competitors/data:/data
      - ./data:/data
      - ./app:/srv/app          # live-mount source: edit templates/CSS/JS then just refresh (no rebuild)
    environment:
      - FC_DB_URL=sqlite:////data/app.db
      # - FC_DEFAULT_INTERVAL_HOURS=12
      # - FC_REQUEST_TIMEOUT=20
      # - FC_SNAPSHOT_RETENTION=10
    restart: unless-stopped

  # MCP server over HTTP — connect AI clients to http://<host>:9528/mcp
  mcp:
    build: .
    container_name: fuck-competitors-mcp
    command: ["python", "-m", "app.mcp_server"]
    ports:
      - "9528:9528"
    volumes:
      - ./data:/data            # same DB as the app (WAL → safe concurrent read/write)
    environment:
      - FC_DB_URL=sqlite:////data/app.db
      - FC_MCP_TRANSPORT=http
      # - FC_MCP_TOKEN=change-me  # REQUIRE a token when exposing this port publicly
    restart: unless-stopped
